{% extends 'base.html' %}
{% block content %}
<div class="mb-6 animate-in">
    <h1 class="text-2xl font-bold text-white">New Support Ticket</h1>
    <p class="text-gray-500 mt-1">Submit a support request to our team</p>
</div>
<div class="max-w-2xl card rounded-xl p-6 animate-in">
    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Subject <span class="text-red-400">*</span></label>
            <input type="text" name="subject" required placeholder="Brief description of your issue" class="input-field w-full rounded-xl px-4 py-3">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Message <span class="text-red-400">*</span></label>
            <textarea name="message" rows="6" required placeholder="Describe your issue in detail..." class="input-field w-full rounded-xl px-4 py-3"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Priority</label>
                <select name="priority" class="input-field w-full rounded-xl px-4 py-3">
                    <option value="low">Low</option><option value="normal" selected>Normal</option><option value="high">High</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Department</label>
                <select name="department" class="input-field w-full rounded-xl px-4 py-3">
                    <option value="support">Support</option><option value="billing">Billing</option><option value="technical">Technical</option>
                </select>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button type="submit" class="btn-primary px-8 py-3 rounded-xl font-semibold inline-flex items-center gap-2"><i class="fas fa-paper-plane"></i>Submit Ticket</button>
            <a href="/tickets" class="text-gray-500 hover:text-gray-300 text-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
