{% extends 'base.html' %}
{% block content %}
<div class="mb-6 animate-in">
    <h1 class="text-2xl font-bold text-white">Edit User: {{ target.username }}</h1>
    <p class="text-gray-500 mt-1">Role: <span class="badge badge-info">{{ target.role }}</span> · Current Balance: <span class="text-gray-300 font-medium">${{ "%.2f"|format(target.balance) }}</span></p>
</div>
<div class="max-w-2xl card rounded-xl p-6 animate-in">
    <form method="POST" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Balance ($)</label><input type="number" name="balance" value="{{ target.balance }}" step="0.01" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Status</label><select name="status" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"><option value="active" {{ 'selected' if target.status=='active' else '' }}>Active</option><option value="suspended" {{ 'selected' if target.status=='suspended' else '' }}>Suspended</option></select></div>
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Max VMs</label><input type="number" name="max_vms" value="{{ target.max_vms }}" min="1" max="999" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Max CPU</label><input type="number" name="max_cpus" value="{{ target.max_cpus }}" min="1" max="999" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Max RAM (MB)</label><input type="number" name="max_ram" value="{{ target.max_ram }}" min="256" max="999999" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-400 mb-2">Max Disk (GB)</label><input type="number" name="max_disk" value="{{ target.max_disk }}" min="10" max="99999" class="input-field w-full rounded-xl px-4 py-3 focus:outline-none"></div>
        </div>
        <div class="pt-4 flex items-center space-x-4">
            <button type="submit" class="btn-primary px-8 py-3 rounded-xl font-semibold inline-flex items-center gap-2"><i class="fas fa-floppy-disk"></i>Save Changes</button>
            <a href="/users" class="text-gray-500 hover:text-gray-300 text-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
