{% extends 'base.html' %}
{% block content %}
<div class="mb-6 animate-in">
    <a href="/knowledge-base" class="text-sm text-blue-400 hover:text-blue-300 inline-flex items-center gap-2 mb-4"><i class="fas fa-arrow-left text-xs"></i>Back to Knowledge Base</a>
    <h1 class="text-2xl font-bold text-white">{{ article.title }}</h1>
    <p class="text-gray-500 mt-1 flex items-center gap-3">
        <span class="badge badge-info">{{ article.category|title }}</span>
        <span class="text-xs">{{ article.created_at[:10] }}</span>
        {% if article.updated_at != article.created_at %}<span class="text-xs text-gray-600">Updated: {{ article.updated_at[:10] }}</span>{% endif %}
    </p>
</div>
<div class="card rounded-xl p-8 animate-in">
    <div class="prose prose-invert max-w-none text-sm leading-relaxed text-gray-300 whitespace-pre-wrap">{{ article.content }}</div>
</div>
{% endblock %}
